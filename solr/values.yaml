# Default is the stock Solr image. Stock Solr creates the core with Solr's
# _default schema; that is fine for non-Drupal use but search_api_solr rejects
# it. For a Drupal project, point this at the shared image that bakes the
# Drupal search_api_solr config set and set execArgs to its config path, e.g.:
#
#   image: "favish/solr-9-drupal-10:1.0"
#   execArgs: ["solr-precreate", "drupal", "/opt/solr-conf"]
#
# The image is per-Drupal-version (its baked schema is generated for a specific
# Drupal / search_api_solr version), so it is opt-in rather than the default.
image: "solr:9.10.1"
storage: 1Gi
# Optional PVC storage class. Empty = cluster default StorageClass.
storageClassName: ""
execArgs:
  - "solr-precreate"
  - "drupal"
# we need to set the open file limit and the Max process limit to 65000 to avoid Solr startup failure with "Too many open files" error
# see https://solr.apache.org/guide/solr/latest/deployment-guide/taking-solr-to-production.html#ulimit-settings-nix-operating-systems for more information
command:
  - "/bin/bash"
  - "-ec"
  - |
    target=65000

    hard_nofile="$(ulimit -Hn)"
    hard_nproc="$(ulimit -Hu)"

    set_nofile="$target"
    set_nproc="$target"

    if [ "$hard_nofile" -lt "$target" ]; then
      set_nofile="$hard_nofile"
    fi
    if [ "$hard_nproc" -lt "$target" ]; then
      set_nproc="$hard_nproc"
    fi

    ulimit -Sn "$set_nofile"
    ulimit -Su "$set_nproc"

    echo "Solr startup limits: nofile soft=$(ulimit -Sn)/hard=$(ulimit -Hn), nproc soft=$(ulimit -Su)/hard=$(ulimit -Hu)"
    exec "$@"
mountPath: "/opt/solr/server/solr/mycores"
# Barebones defaults. The JVM heap (SOLR_JAVA_MEM) must fit inside the memory
# limit with headroom for Lucene's off-heap mmap; keep Xms == Xmx and size the
# memory request/limit around the heap. The previous default paired a 5g heap
# with a 200M request and no limit, which could not be scheduled sanely and let
# the pod balloon past the node. Real deployments should override both together.
resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    memory: 1Gi
env:
  - name: SOLR_JAVA_MEM
    value: "-Xms512m -Xmx512m"
  # Default modules recommended for Drupal Search API Solr in Solr 9+
  - name: SOLR_OPTS
    value: "-Dsolr.modules=extraction,langid,analysis-extras -Dlog4j2.formatMsgNoLookups=true"

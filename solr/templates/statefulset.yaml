apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ template "solr.fullname" . }}
  labels:
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
spec:
  selector:
    matchLabels:
      app: {{ template "solr.fullname" . }}
  serviceName: {{ template "solr.fullname" . }}
  replicas: 1
  template:
    metadata:
      labels:
        app: {{ template "solr.fullname" . }}
    spec:
      securityContext:
        fsGroup: 8983
      terminationGracePeriodSeconds: 10
      containers:
      - name: solr
        image: {{ .Values.image }}
        {{- with .Values.env }}
        env:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        resources:
          {{- toYaml .Values.resources | nindent 12 }}
        ports:
        - containerPort: 8983
          name: solr
        command:
          {{- tpl (toYaml .Values.command) . | nindent 12 }}
        args:
          - "--"
          {{- with .Values.execArgs }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
        # Gate liveness until the JVM has finished starting, so a slow cold start
        # (large heap / core load) is not killed by the liveness probe.
        startupProbe:
          httpGet:
            path: /solr
            port: 8983
          periodSeconds: 5
          failureThreshold: 30
        livenessProbe:
          httpGet:
            path: /solr
            port: 8983
          initialDelaySeconds: 30
          periodSeconds: 5
        # Gate Service traffic until Solr can actually answer, so clients are not
        # routed to a starting/GC-paused pod.
        readinessProbe:
          httpGet:
            path: /solr/admin/info/system
            port: 8983
          initialDelaySeconds: 10
          periodSeconds: 10
        volumeMounts:
        - name: {{ template "solr.fullname" . }}-cores
          mountPath: {{ .Values.mountPath }}
  volumeClaimTemplates:
  - metadata:
      name: {{ template "solr.fullname" . }}-cores
    spec:
      accessModes: [ "ReadWriteOnce" ]
      {{- with .Values.storageClassName }}
      storageClassName: {{ . }}
      {{- end }}
      resources:
        requests:
          storage: {{ .Values.storage }}
